<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayush Aquarium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="main-title">Ayush Aquarium</h1>
    <div class="nav-container">
        <button class="menu-btn" onclick="openModal('side-menu-modal')">☰ Menu</button>
        <input type="text" id="product-search" placeholder="Search fish...">
        <div class="nav-right">
            <div class="icon-group" onclick="openModal('wishlist-modal')">❤️ <span id="wish-count" class="count">0</span></div>
            <div class="icon-group" onclick="openModal('cart-modal')">🛒 <span id="cart-count" class="count">0</span></div>
        </div>
    </div>
</header>

<div id="account-modal" class="modal">
    <div class="modal-content">
        <button class="close-x" onclick="closeModal('account-modal')">×</button>
        <h3>User Account</h3>
        <input type="text" id="acc-name" placeholder="Full Name">
        <input type="tel" id="acc-phone" placeholder="Phone No">
        <input type="email" id="acc-email" placeholder="Gmail">
        <textarea id="acc-address" placeholder="Delivery Address"></textarea>
        <button class="save-btn" onclick="saveProfile()">Save Profile</button>
    </div>
</div>

<div id="cart-modal" class="modal">
    <div class="modal-content">
        <button class="close-x" onclick="closeModal('cart-modal')">×</button>
        <h3>My Cart</h3>
        <div id="cart-items">Empty</div>
        <button class="order-btn" onclick="placeOrder()">Order Now</button>
    </div>
</div>

<div id="side-menu-modal" class="modal">
    <div class="modal-content side-menu">
        <button class="close-x" onclick="closeModal('side-menu-modal')">×</button>
        <a href="#" onclick="closeModal('side-menu-modal')">Home</a>
        <a href="javascript:void(0)" onclick="openModal('account-modal'); closeModal('side-menu-modal')">Account</a>
        <a href="javascript:void(0)" onclick="alert('WhatsApp Us for details')">Order Info</a>
    </div>
</div>

<h2 class="section-title">Live Fish</h2>
<div class="product-container">
    <div class="product-card">
        <img src="image%20folder/Betta.jpg" alt="Betta">
        <h3>Betta Fish</h3>
        <p class="price">₹150</p>
        <div class="quantity-controls">
            <button onclick="changeQty(this, -1)">-</button>
            <input type="number" class="qty-input" value="1" min="1" readonly>
            <button onclick="changeQty(this, 1)">+</button>
        </div>
        <button class="add-btn" onclick="addToCart('Betta Fish', 150, this)">Add to Cart</button>
    </div>
</div>

<script src="script.js"></script>
</body>
    </html>
