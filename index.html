<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayush Aquarium | Exotic Fish Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="main-title">Ayush Aquarium</h1>
    <div class="nav-container">
        <div class="menu-wrapper">
            <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
            <div id="side-menu" class="side-menu">
                <a href="index.html">Home</a>
                <a href="javascript:void(0)" onclick="openModal('account-modal')">Account</a>
                <a href="#">Order Info</a>
                <a href="#">Contact</a>
            </div>
        </div>

        <input type="text" id="product-search" placeholder="Search fish...">

        <div class="nav-right">
            <div class="icon-group" onclick="openModal('wishlist-modal')">
                ❤️ <span id="wish-count" class="count">0</span>
            </div>
            <div class="icon-group" onclick="openModal('cart-modal')">
                🛒 <span id="cart-count" class="count">0</span>
            </div>
        </div>
    </div>
</header>

<div id="account-modal" class="modal">
    <div class="modal-content">
        <h3>User Account</h3>
        <input type="text" placeholder="Full Name">
        <input type="tel" placeholder="Phone No">
        <input type="email" placeholder="Gmail">
        <input type="date">
        <input type="number" placeholder="Age">
        <textarea placeholder="Address"></textarea>
        <button class="save-btn" onclick="closeModal('account-modal')">Save Profile</button>
    </div>
</div>

<div id="wishlist-modal" class="modal">
    <div class="modal-content">
        <h3>My Wishlist</h3>
        <div id="wishlist-items">Your wishlist is empty.</div>
        <button class="close-btn" onclick="closeModal('wishlist-modal')">Close</button>
    </div>
</div>

<div id="cart-modal" class="modal">
    <div class="modal-content">
        <h3>My Cart</h3>
        <div id="cart-items">No items in cart.</div>
        <hr>
        <button class="order-btn" onclick="placeOrder()">Order Now</button>
        <button class="close-btn" onclick="closeModal('cart-modal')">Close</button>
    </div>
</div>

<h2 class="section-title">Live Fish</h2>
<div class="product-container">
    <div class="product-card">
        <img src="image folder/Betta.jpg" alt="Betta">
        <h3>Betta Fish</h3>
        <p class="price">₹150</p>
        <button class="view-btn" onclick="showDetails('Betta Fish', 'Premium Red Betta, perfect for small tanks.')">View Details</button>
        <div class="quantity-controls">
    <button type="button" class="qty-btn" onclick="changeQty(this, -1)">-</button>
    <input type="number" class="qty-input" value="1" min="1" readonly>
    <button type="button" class="qty-btn" onclick="changeQty(this, 1)">+</button>
</div>
        <button class="add-btn" onclick="addToCart('Betta Fish', 150)">Add to Cart</button>
    </div>
    
    <div class="product-card">
        <img src="image folder/Goldfish.jpg" alt="Goldfish">
        <h3>Goldfish</h3>
        <p class="price">₹250</p>
        <button class="view-btn" onclick="showDetails('Goldfish', 'Fancy Orange Goldfish.')">View Details</button>
        <div class="quantity-controls">
    <button type="button" class="qty-btn" onclick="changeQty(this, -1)">-</button>
    <input type="number" class="qty-input" value="1" min="1" readonly>
    <button type="button" class="qty-btn" onclick="changeQty(this, 1)">+</button>
</div>
        <button class="add-btn" onclick="addToCart('Goldfish', 250)">Add to Cart</button>
    </div>
</div>

    <h2 class="section-title">Dry Items</h2>
<div class="product-container">
    <div class="product-card">
        <img src="image folder/Air Pump.jpg" alt="Air Pump">
        <h3>Air Pump</h3>
        <p class="price">₹350</p>
        <button class="view-btn" onclick="showDetails('Air Pump', 'Te product is very nice.')">View Details</button>
        <div class="quantity-controls">
    <button type="button" class="qty-btn" onclick="changeQty(this, -1)">-</button>
    <input type="number" class="qty-input" value="1" min="1" readonly>
    <button type="button" class="qty-btn" onclick="changeQty(this, 1)">+</button>
</div>
        <button class="add-btn" onclick="addToCart('Air Pump', 350)">Add to Cart</button>
    </div>
    
    <div class="product-card">
        <img src="image folder/Fish Pot.jpg" alt="Fish Pot">
        <h3>Fish Pot</h3>
        <p class="price">₹360</p>
        <button class="view-btn" onclick="showDetails('Fish Pot', 'Fish Pot 10inch.')">View Details</button><div class="quantity-controls">
    <button type="button" class="qty-btn" onclick="changeQty(this, -1)">-</button>
    <input type="number" class="qty-input" value="1" min="1" readonly>
    <button type="button" class="qty-btn" onclick="changeQty(this, 1)">+</button>
</div>
        <button class="add-btn" onclick="addToCart('Fish Pot', 360)">Add to Cart</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
